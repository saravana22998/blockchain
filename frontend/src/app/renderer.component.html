<div class="saas-renderer" *ngIf="certificateData">
  <!-- Background Image layer -->
  <div class="background-layer" *ngIf="certificateData.saasTemplate?.backgroundUrl">
    <img [src]="certificateData.saasTemplate.backgroundUrl" class="cert-image">
  </div>

  <!-- Dynamic Fields layer -->
  <div class="fields-layer">
    <div 
      *ngFor="let field of certificateData.saasTemplate?.fields"
      class="dynamic-field"
      [style.left.%]="field.x"
      [style.top.%]="field.y"
      [style.font-size]="field.fontSize"
      [style.color]="field.color"
    >
      {{ getFieldValue(field.id) }}
    </div>
  </div>
</div>

<div *ngIf="!certificateData" style="display: flex; height: 100vh; align-items: center; justify-content: center; color: #999;">
  <p>Waiting for certificate data...</p>
</div>
